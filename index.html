<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى الأبد ❤️</title>
    <style>
        body { background-color: #fdfdf0; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; color: #5d4037; }
        #login-screen { text-align: center; background: white; padding: 40px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .pass-field { width: 140px; height: 45px; text-align: center; font-size: 22px; border: 2px solid #ddd; border-radius: 10px; outline: none; }
        #main-content { display: none; text-align: center; width: 100%; }
        .counter-container { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 20px; }
        .box { background: white; padding: 15px; border-radius: 15px; min-width: 70px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .number { font-size: 24px; font-weight: bold; color: #d81b60; display: block; }
        .label { font-size: 12px; color: #888; }
        .memories-btn { position: fixed; top: 20px; right: 20px; background: #d81b60; color: white; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; display: none; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; max-height: 80vh; overflow-y: auto; }
        .gallery-item { width: 100%; border-radius: 10px; margin-bottom: 10px; border: 2px solid #eee; }
        .heart { position: absolute; color: #ff4081; font-size: 20px; pointer-events: none; animation: floatUp 6s linear forwards; }
        @keyframes floatUp { 0% { transform: translateY(100vh); opacity: 1; } 100% { transform: translateY(-10vh); opacity: 0; } }
    </style>
</head>
<body>

    <button id="memBtn" class="memories-btn" onclick="openMemories()">📅 ذكرياتنا</button>

    <div id="login-screen">
        <h2 style="color: #880e4f;">كلمة السر ❤️</h2>
        <input type="password" class="pass-field" maxlength="5" oninput="checkPass(this.value)">
    </div>

    <div id="main-content">
        <h1 style="color: #880e4f;">كل لحظة وأنا معاكي♥</h1>
        <div class="counter-container">
            <div class="box"><span id="years" class="number">0</span><span class="label">سنة</span></div>
            <div class="box"><span id="months" class="number">0</span><span class="label">شهر</span></div>
            <div class="box"><span id="days" class="number">0</span><span class="label">يوم</span></div>
            <div class="box"><span id="hours" class="number">0</span><span class="label">ساعة</span></div>
            <div class="box"><span id="minutes" class="number">0</span><span class="label">دقيقة</span></div>
            <div class="box"><span id="seconds" class="number">0</span><span class="label">ثانية</span></div>
        </div>
    </div>

    <div id="memoriesModal" class="modal">
        <div class="modal-content">
            <h3 style="color: #d81b60;">ألبوم صورنا</h3>
            <input type="text" id="imgInput" placeholder="حط رابط الصورة هنا..." style="width:80%; padding:10px; margin-bottom:10px; border-radius:10px; border:1px solid #ddd;">
            <button onclick="savePhoto()" style="background:#d81b60; color:white; border:none; padding:10px; border-radius:10px; width:85%;">إضافة الصورة 📷</button>
            <div id="gallery" style="margin-top:20px;"></div>
            <button onclick="closeMemories()" style="margin-top:20px; border:none; background:none; color:#888;">إغلاق</button>
        </div>
    </div>

    <script>
        const startDate = new Date(2025, 2, 27, 0, 0, 0); // 27 مارس 2025

        function checkPass(v) {
            if (v === "55555") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('memBtn').style.display = 'block';
                setInterval(updateTimer, 1000);
                startHearts();
                loadPhotos();
            }
        }

        function updateTimer() {
            const now = new Date();
            let diff = now - startDate;
            let years = now.getFullYear() - startDate.getFullYear();
            let months = now.getMonth() - startDate.getMonth();
            let days = now.getDate() - startDate.getDate();
            if (days < 0) { months--; days += new Date(now.getFullYear(), now.getMonth(), 0).getDate(); }
            if (months < 0) { years--; months += 12; }
            document.getElementById("years").innerText = years;
            document.getElementById("months").innerText = months;
            document.getElementById("days").innerText = days;
            document.getElementById("hours").innerText = Math.floor((diff / 3600000) % 24);
            document.getElementById("minutes").innerText = Math.floor((diff / 60000) % 60);
            document.getElementById("seconds").innerText = Math.floor((diff / 1000) % 60);
        }

        function savePhoto() {
            const url = document.getElementById('imgInput').value;
            if(!url) return;
            let photos = JSON.parse(localStorage.getItem('myMemories') || "[]");
            photos.push(url);
            localStorage.setItem('myMemories', JSON.stringify(photos));
            document.getElementById('imgInput').value = "";
            loadPhotos();
        }

        function loadPhotos() {
            let photos = JSON.parse(localStorage.getItem('myMemories') || "[]");
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = "";
            photos.reverse().forEach(src => {
                const img = document.createElement('img');
                img.src = src; img.className = 'gallery-item';
                gallery.appendChild(img);
            });
        }

        function startHearts() {
            setInterval(() => {
                const h = document.createElement('div'); h.className = 'heart'; h.innerHTML = '❤️';
                h.style.left = Math.random() * 100 + 'vw'; document.body.appendChild(h);
                setTimeout(() => h.remove(), 6000);
            }, 500);
        }
        function openMemories() { document.getElementById('memoriesModal').style.display = 'flex'; }
        function closeMemories() { document.getElementById('memoriesModal').style.display = 'none'; }
    </script>
</body>
</html>
